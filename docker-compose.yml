name: ur-simulation-suite
services:
  ursim-service:
    image: universalrobots/ursim_e-series:${POLYSCOPE}
    env_file:
      - .env
    container_name: ursim-container
    restart: always
    tty: true
    privileged: true
    volumes:
      - ./urcaps:/urcaps
      - ./programs:/ursim/programs
    ports:
      - 29999:29999
      - 6080:6080
      - 30001:30001
      - 30004:30004
      - 30002:30002
      - 50002:50002
    # robodk-service:
    #   container_name: robodk-container
    #   image: robodk/robodk
